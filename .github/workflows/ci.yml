# Vodou is developed on Windows. This workflow is the Linux machine the
# author doesn't have: it runs the platform assertions on ubuntu-latest so the
# POSIX branches (keyring sealing, 0700/0600 modes, non-D3D graphics flags)
# are exercised on every push instead of first meeting a user.
#
# It cannot test rendering. GPU, Wayland vs X11, and the Chromium sandbox need
# real hardware and a real session; those remain manual checks.
name: CI

on:
  push:
    branches: [master, linux-support]
  pull_request:

# A workflow is the one place a merged change runs with repository
# credentials. Read-only by default, and the trigger above is `pull_request`
# (which checks out the PR without secrets) — never `pull_request_target`.
permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python: ["3.11", "3.13"]

    steps:
      # Actions are pinned to commit SHAs, not tags: a tag can be moved to
      # point at different code, and this job can read the repo.
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09  # v5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python }}

      # Qt WebEngine links these even under the offscreen platform plugin;
      # without them `import main` fails before any assertion runs.
      - name: Install Qt runtime libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libnss3 libxdamage1 libxrandr2 \
            libxcomposite1 libxtst6 libasound2t64 libdbus-1-3 \
            desktop-file-utils

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Compile every module
        run: python -m py_compile $(python -c "import glob;print(' '.join(glob.glob('*.py')))")
        shell: bash

      - name: Platform assertions
        env:
          QT_QPA_PLATFORM: offscreen
        run: python tests/test_platform.py

      # Catches a CRLF shebang or a typo before a Linux user does.
      - name: Check the launcher and installer
        if: runner.os == 'Linux'
        run: |
          sh -n packaging/install-linux.sh
          sh -n docker/setup.sh
          sed 's|@EXEC@|/bin/true|' packaging/vodou.desktop > /tmp/vodou.desktop
          desktop-file-validate /tmp/vodou.desktop

      # The published SearXNG config must never carry a real secret.
      - name: Check no secret was committed
        run: grep -q "__REPLACE_WITH_RANDOM_SECRET__" docker/searxng/settings.yml
        shell: bash
